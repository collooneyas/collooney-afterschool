<style>
:root{
  --navy:#1A3560;--teal:#2E86AB;--green:#2d9e6b;--red:#e63946;
  --lt:#EBF4FB;--gry:#F5F7FA;--mid:#7A8394;--dark:#1a1a2e;
  --border:#C8D8E8;--yellow:#FFF9C4;--yborder:#F9A825;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Lato',sans-serif;background:linear-gradient(135deg,#e8f4fb 0%,#f0f4f8 60%,#ddeef7 100%);min-height:100vh;color:var(--dark)}

/* Header */
.hdr{background:var(--navy);padding:12px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 12px rgba(0,0,0,0.2)}
.hdr img{width:48px;height:48px;border-radius:50%;border:2px solid rgba(255,255,255,0.25);object-fit:cover;flex-shrink:0}
.hdr-name h1{font-family:'Nunito',sans-serif;font-size:1.15rem;font-weight:800;color:white;line-height:1.1}
.hdr-name p{font-size:0.68rem;color:rgba(255,255,255,0.55);margin-top:1px}
.hdr-tag{margin-left:auto;font-family:'Nunito',sans-serif;font-size:0.7rem;color:var(--teal);font-weight:700;text-transform:uppercase;letter-spacing:0.05em;white-space:nowrap}

/* Progress */
.prog{background:var(--navy);padding:10px 20px 14px}
.prog-steps{display:flex;justify-content:space-between;margin-bottom:8px}
.prog-step{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:default}
.prog-dot{width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;font-size:0.7rem;font-weight:800;color:rgba(255,255,255,0.3);transition:all 0.3s}
.prog-dot.active{background:var(--teal);border-color:var(--teal);color:white;box-shadow:0 0 0 3px rgba(46,134,171,0.3)}
.prog-dot.done{background:var(--green);border-color:var(--green);color:white}
.prog-dot.done::after{content:"✓";font-size:0.65rem}
.prog-lbl{font-size:0.55rem;color:rgba(255,255,255,0.35);font-weight:700;text-transform:uppercase;text-align:center;max-width:46px;line-height:1.2;transition:color 0.3s}
.prog-lbl.active{color:rgba(255,255,255,0.8)}
.prog-lbl.done{color:rgba(255,255,255,0.5)}
.prog-bar{background:rgba(255,255,255,0.1);border-radius:99px;height:4px;overflow:hidden}
.prog-fill{background:linear-gradient(90deg,var(--teal),#56c8f5);height:100%;border-radius:99px;transition:width 0.5s cubic-bezier(0.4,0,0.2,1)}

/* Card */
.wrap{max-width:700px;margin:20px auto 60px;padding:0 12px}
.card{background:white;border-radius:16px;box-shadow:0 4px 24px rgba(26,53,96,0.10);overflow:hidden;animation:fadeUp 0.3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card-hd{background:linear-gradient(135deg,var(--navy),#1e4a80);padding:16px 20px;display:flex;align-items:center;gap:10px}
.card-hd-icon{font-size:1.5rem;line-height:1;flex-shrink:0}
.card-hd h2{font-family:'Nunito',sans-serif;font-size:1.05rem;font-weight:800;color:white}
.card-hd p{font-size:0.72rem;color:rgba(255,255,255,0.6);margin-top:2px}
.card-body{padding:20px}
.card-ft{padding:12px 20px;background:var(--gry);border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}

/* Boxes */
.info-box{background:var(--lt);border-left:4px solid var(--teal);border-radius:0 9px 9px 0;padding:10px 13px;font-size:0.79rem;color:#2c4a6e;line-height:1.6;margin-bottom:14px;font-style:italic}
.warn-box{background:#fff3cd;border-left:4px solid #ffc107;border-radius:0 9px 9px 0;padding:10px 13px;font-size:0.79rem;color:#856404;line-height:1.6;margin-bottom:14px}
.sec-lbl{font-family:'Nunito',sans-serif;font-size:0.68rem;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:var(--teal);margin:18px 0 10px;padding-bottom:5px;border-bottom:2px solid var(--lt);display:flex;align-items:center;gap:6px}
.sec-lbl:first-child{margin-top:0}
.optional{font-size:0.62rem;color:var(--mid);font-weight:400;letter-spacing:0;text-transform:none;margin-left:auto}

/* Fields */
.field{margin-bottom:12px}
.field label{display:block;font-size:0.77rem;font-weight:700;color:var(--navy);margin-bottom:4px}
.opt-tag{font-size:0.67rem;color:var(--mid);font-weight:400;margin-left:4px}
.hint{font-weight:400;color:var(--mid);font-size:0.68rem;display:block;margin-top:1px}
.req{color:var(--red);font-size:0.8rem}
.field input,.field select,.field textarea{
  width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;
  font-family:'Lato',sans-serif;font-size:0.87rem;color:var(--dark);background:var(--gry);
  outline:none;transition:all 0.18s
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--teal);background:white;box-shadow:0 0 0 3px rgba(46,134,171,0.1)}
.field input.err,.field select.err,.field textarea.err{border-color:var(--red);background:#fff8f8}
.field textarea{min-height:68px;resize:vertical}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
@media(max-width:500px){.row2,.row3{grid-template-columns:1fr}}

/* Day buttons */
.day-grid{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.day-btn{flex:1;min-width:72px;padding:10px 4px;border:2px solid var(--border);border-radius:9px;background:white;font-family:'Nunito',sans-serif;font-size:0.78rem;font-weight:800;color:var(--navy);cursor:pointer;text-align:center;transition:all 0.15s;user-select:none;-webkit-tap-highlight-color:transparent}
.day-btn:hover{border-color:var(--teal);background:var(--lt)}
.day-btn.sel{background:var(--navy);border-color:var(--navy);color:white}
.day-info{font-size:0.69rem;margin-top:5px}
.day-info.warn{color:var(--red);font-weight:700}
.day-info.ok{color:var(--green);font-weight:700}
.day-info.neutral{color:var(--mid)}

/* Cost results */
.cost-card{background:linear-gradient(135deg,var(--navy),#1e4a80);border-radius:12px;padding:18px;color:white;margin:14px 0}
.cost-card h4{font-family:'Nunito',sans-serif;font-size:0.8rem;font-weight:800;margin-bottom:12px;opacity:0.8;text-transform:uppercase;letter-spacing:0.06em}
.cost-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.1)}
.cost-row:last-child{border-bottom:none}
.cost-lbl{font-size:0.78rem;opacity:0.75}
.cost-val{font-family:'Nunito',sans-serif;font-size:0.95rem;font-weight:800}
.cost-val.big{font-size:1.25rem;color:#56c8f5}
.cost-val.grn{color:#56e8a0}
.cost-note{background:rgba(255,255,255,0.07);border-radius:8px;padding:10px;margin-top:10px;font-size:0.72rem;opacity:0.8;line-height:1.7}

/* Accept */
.accept-box{background:var(--gry);border:2px solid var(--border);border-radius:10px;padding:14px;margin:12px 0}
.accept-box h4{font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:800;color:var(--navy);margin-bottom:8px}
.chk-wrap{display:flex;align-items:flex-start;gap:10px;cursor:pointer}
.chk-wrap input[type=checkbox]{width:18px;height:18px;margin-top:2px;accent-color:var(--teal);cursor:pointer;flex-shrink:0}
.chk-wrap span{font-size:0.8rem;line-height:1.5;color:var(--dark)}

/* Radio */
.radio-grp{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.radio-opt{display:flex;align-items:center;gap:7px;background:var(--gry);border:1.5px solid var(--border);border-radius:8px;padding:7px 12px;cursor:pointer;font-size:0.8rem;font-weight:600;color:var(--navy);transition:all 0.15s;user-select:none}
.radio-opt:hover{border-color:var(--teal);background:var(--lt)}
.radio-opt input{accent-color:var(--teal)}

/* Perm table */
.perm-tbl{width:100%;border-collapse:collapse;font-size:0.77rem;margin-top:8px}
.perm-tbl th{background:var(--navy);color:white;font-family:'Nunito',sans-serif;font-size:0.65rem;font-weight:800;text-transform:uppercase;letter-spacing:0.05em;padding:7px 8px;text-align:center}
.perm-tbl th:first-child{text-align:left;border-radius:7px 0 0 0}
.perm-tbl th:last-child{border-radius:0 7px 0 0}
.perm-tbl td{padding:8px;border-bottom:1px solid var(--border)}
.perm-tbl tr:nth-child(odd) td{background:var(--gry)}
.perm-tbl tr:nth-child(even) td{background:var(--lt)}
.perm-tbl tr:last-child td{border-bottom:none}
.perm-tbl td:not(:first-child){text-align:center}
.perm-r{width:17px;height:17px;accent-color:var(--teal);cursor:pointer}

/* Person block */
.person-blk{background:var(--lt);border:1.5px solid var(--border);border-radius:9px;padding:13px;margin-bottom:10px}
.person-blk h4{font-family:'Nunito',sans-serif;font-size:0.82rem;font-weight:800;color:var(--navy);margin-bottom:10px;display:flex;align-items:center;gap:5px}

/* Buttons */
.btn{font-family:'Nunito',sans-serif;font-weight:800;font-size:0.87rem;padding:11px 22px;border-radius:99px;border:none;cursor:pointer;transition:all 0.18s;display:inline-flex;align-items:center;gap:7px;-webkit-tap-highlight-color:transparent}
.btn-back{background:white;color:var(--navy);border:1.5px solid var(--border)}
.btn-back:hover{border-color:var(--teal);color:var(--teal)}
.btn-next{background:linear-gradient(135deg,var(--teal),var(--navy));color:white;box-shadow:0 4px 14px rgba(46,134,171,0.3)}
.btn-next:active{transform:scale(0.97)}
.btn-submit{background:linear-gradient(135deg,var(--green),#1a7a50);color:white;box-shadow:0 4px 14px rgba(45,158,107,0.3)}
.btn-submit:active{transform:scale(0.97)}
.btn-submit:disabled{opacity:0.5;cursor:not-allowed}

/* Errors */
.err-msg{color:var(--red);font-size:0.7rem;font-weight:700;margin-top:3px;display:none}
.err-msg.show{display:block}
.page-err{background:#fff0f1;border:1.5px solid #f5c0c4;border-radius:7px;padding:8px 12px;color:var(--red);font-size:0.78rem;font-weight:700;margin-bottom:12px;display:none}
.page-err.show{display:flex;align-items:center;gap:6px}

/* NCS links */
.ncs-links{background:var(--lt);border-radius:9px;padding:12px 14px;font-size:0.78rem;line-height:2;margin-bottom:12px}
.ncs-links a{color:var(--teal);font-weight:700;word-break:break-all}

/* Welcome cards */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.ic{background:var(--gry);border:1.5px solid var(--border);border-radius:10px;padding:13px}
.ic-icon{font-size:1.3rem;margin-bottom:4px}
.ic-title{font-family:'Nunito',sans-serif;font-size:0.76rem;font-weight:800;color:var(--navy);margin-bottom:2px}
.ic-text{font-size:0.72rem;color:var(--mid);line-height:1.5}

/* Success */
.success-wrap{text-align:center;padding:32px 20px}
.success-icon{width:68px;height:68px;background:linear-gradient(135deg,var(--green),#1a7a50);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;color:white;margin:0 auto 16px;box-shadow:0 6px 20px rgba(45,158,107,0.3);animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.pdf-btn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#1A3560,#2E86AB);color:white;border:none;padding:14px 28px;border-radius:99px;font-family:'Nunito',sans-serif;font-weight:800;font-size:0.92rem;cursor:pointer;margin:6px 4px;transition:all 0.2s}
.pdf-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(26,53,96,0.3)}
.dl-btn{display:inline-flex;align-items:center;gap:8px;background:white;color:var(--navy);border:2px solid var(--border);padding:10px 22px;border-radius:99px;font-family:'Nunito',sans-serif;font-weight:700;font-size:0.8rem;cursor:pointer;margin:4px}
.spinner{display:inline-block;width:18px;height:18px;border:3px solid rgba(255,255,255,0.3);border-radius:50%;border-top-color:white;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

  stepsEl.innerHTML = STEPS.map(function(s) {
    var cls = s.n === p ? 'active' : s.n < p ? 'done' : '';
    return '<div class="prog-step">' +
      '<div class="prog-dot '+cls+'">'+(s.n < p ? '' : s.n)+'</div>' +
      '<div class="prog-lbl '+cls+'">'+s.lbl+'</div>' +
      '</div>';
  }).join('');
  document.getElementById('progFill').style.width = Math.round(p/TOTAL*100)+'%';
}

// ── Render page ───────────────────────────────────────────────────────────
function render(p) {
  S.pg = p;
  // Auto-fill child name into dependent fields
  if (S.childName) {
    if (!S.collectChild) S.collectChild = S.childName;
    if (!S.medChildName) S.medChildName = S.childName;
  }
  renderProgress(p);
  var pages = [null,p1Welcome,p2Cost,p3Child,p4Contacts,p5Medical,p6Consents,p7Final];
  document.getElementById('mainCard').innerHTML = pages[p]();
  window.scrollTo({top:0,behavior:'smooth'});
  saveLocal();
}

// ── Save all visible inputs ───────────────────────────────────────────────
function saveInputs() {
  document.querySelectorAll('[id]').forEach(function(el) {
    if (!el.id || !(el.id in S)) return;
    if (el.type === 'checkbox') S[el.id] = el.checked;
    else if (el.tagName === 'INPUT' || el.tagName === 'SELECT' || el.tagName === 'TEXTAREA') S[el.id] = el.value;
  });
  document.querySelectorAll('.perm-r:checked').forEach(function(r) {
    S.perms[r.dataset.perm] = r.dataset.val;
  });
  document.querySelectorAll('input[type=radio]:checked').forEach(function(r) {
    if (r.name in S) S[r.name] = r.value;
  });
  saveLocal();
}

// ── Validation ────────────────────────────────────────────────────────────
function vReq(id) {
  var el = document.getElementById(id);
  if (!el) return true;
  var ok = el.type==='checkbox' ? el.checked : !!el.value.trim();
  el.classList.toggle('err', !ok);
  var e = document.getElementById('e_'+id);
  if (e) e.classList.toggle('show', !ok);
  return ok;
}
function showPErr(msg) {
  var el = document.getElementById('pErr');
  if (el) { el.textContent = '⚠ '+(msg||'Please complete all required fields.'); el.classList.add('show'); }
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── Field builder ─────────────────────────────────────────────────────────
function F(label, id, type, req, hint, opt) {
  var rq = req ? '<span class="req">*</span>' : '<span class="opt-tag">(optional)</span>';
  var hn = hint ? '<span class="hint">'+hint+'</span>' : '';
  var val = S[id] !== undefined ? S[id] : '';
  var el;
  if (type==='textarea') {
    el = '<textarea id="'+id+'"'+(req?' data-r':'')+'>'+val+'</textarea>';
  } else {
    el = '<input type="'+type+'" id="'+id+'"'+(req?' data-r':'')+' value="'+val+'">';
  }
  return '<div class="field"><label>'+label+' '+rq+hn+'</label>'+el+'<div class="err-msg" id="e_'+id+'">Required.</div></div>';
}
function r2(a,b){return '<div class="row2">'+a+b+'</div>';}
function r3(a,b,c){return '<div class="row3">'+a+b+c+'</div>';}
function sl(txt,icon){return '<div class="sec-lbl">'+(icon||'')+'<span>'+txt+'</span></div>';}
function chk(id,label,onchg) {
  return '<label class="chk-wrap"><input type="checkbox" id="'+id+'" '+(S[id]?'checked':'')+' onchange="S[\''+id+'\']=this.checked;'+(onchg||'')+'"><span>'+label+'</span></label>';
}
function ropt(name,val) {
  return '<label class="radio-opt"><input type="radio" name="'+name+'" value="'+val+'" '+(S[name]===val?'checked':'')+' onchange="S[\''+name+'\']=this.value">'+val+'</label>';
}
function nav(back,next,nextFn,isFirst) {
  var backBtn = isFirst ? '<div></div>' : '<button class="btn btn-back" onclick="goBack('+back+')">&#8592; Back</button>';
  return '<div class="card-ft">'+backBtn+'<button class="btn btn-next" onclick="'+nextFn+'">'+next+' &#8594;</button></div>';
}

// ── Calc ──────────────────────────────────────────────────────────────────
function calc() {
  var rate = parseFloat(S.rate)||0;
  var n = S.days.length;
  var hpd = (S.cls==='Junior Infants'||S.cls==='Senior Infants') ? 4 : 3;
  var sub = rate*hpd;
  var cd = Math.max(0,25-sub);
  return {hpd:hpd,sub:+sub.toFixed(2),cd:+cd.toFixed(2),cw:+(cd*n).toFixed(2),n:n,rate:rate};
}

var debTimer = null;
function debounceCost() {
  if (debTimer) clearTimeout(debTimer);
  var val = document.getElementById('rate') ? document.getElementById('rate').value : '';
  S.rate = val;
  var r = parseFloat(val);
  if (!val || val.length < 3 || isNaN(r) || r < 2 || r > 5.30) {
    document.getElementById('costPrev').innerHTML = '';
    return;
  }
  debTimer = setTimeout(showCostPreview, 700);
}

function showCostPreview() {
  var el = document.getElementById('costPrev');
  if (!el) return;
  if (!S.cls || S.days.length<1 || !S.rate) { el.innerHTML=''; return; }
  var r = parseFloat(S.rate);
  if (isNaN(r)||r<2.14||r>5.30) { el.innerHTML=''; return; }
  var c = calc();
  S.costDay=c.cd; S.costWeek=c.cw;
  el.innerHTML =
    '<div class="cost-card"><h4>Cost Summary</h4>'+
    cr('Our daily rate','&euro;25.00','')+
    cr('Your NCS hourly rate','&euro;'+c.rate.toFixed(2),'')+
    cr('Minding hrs per day',c.hpd+' hrs ('+S.cls+')','')+ 
    cr('NCS subsidy per day','&minus; &euro;'+c.sub.toFixed(2),'grn')+
    cr('Days per week',c.n+' ('+S.days.join(', ')+')','')+
    cr('Your cost per day','&euro;'+c.cd.toFixed(2),'big')+
    cr('Your cost per week','&euro;'+c.cw.toFixed(2),'big')+
    '<div class="cost-note">&#8364;25.00 &minus; (&#8364;'+c.rate.toFixed(2)+' &times; '+c.hpd+'hrs) = &#8364;'+c.cd.toFixed(2)+'/day &nbsp;&bull;&nbsp; &#8364;'+c.cd.toFixed(2)+' &times; '+c.n+' days = &#8364;'+c.cw.toFixed(2)+'/week</div></div>'+
    '<div class="accept-box"><h4>Please Accept to Continue</h4>'+
    '<label class="chk-wrap"><input type="checkbox" id="accepted" '+(S.accepted?'checked':'')+' onchange="S.accepted=this.checked">'+
    '<span>I have reviewed my cost breakdown and accept the weekly charge of <strong>&#8364;'+c.cw.toFixed(2)+'</strong> (&#8364;'+c.cd.toFixed(2)+'/day &times; '+c.n+' days) based on my NCS rate of &#8364;'+c.rate.toFixed(2)+'/hr.</span></label></div>';
}
function cr(l,v,cls){return '<div class="cost-row"><span class="cost-lbl">'+l+'</span><span class="cost-val '+cls+'">'+v+'</span></div>';}

function toggleDay(d) {
  var i = S.days.indexOf(d);
  if (i>-1) S.days.splice(i,1);
  else if (S.days.length<5) S.days.push(d);
  // Update buttons
  document.querySelectorAll('.day-btn').forEach(function(b){
    b.classList.toggle('sel', S.days.indexOf(b.dataset.day)>-1);
  });
  // Update count
  var n=S.days.length, el=document.getElementById('dayCnt');
  if(el){
    if(n===0){el.textContent='Select at least 3 days';el.className='day-info neutral';}
    else if(n<3){el.textContent=n+' selected — minimum is 3 days';el.className='day-info warn';}
    else{el.textContent=n+' day'+(n>1?'s':'')+' selected ✓';el.className='day-info ok';}
  }
  showCostPreview();
}

  '<div class="info-box">I authorise the following people to collect my child in my absence. Unless I have spoken to the Manager, my child cannot be collected by any other person.</div>'+
  F('Child&#39;s Name','collectChild','text',true)+
  pb(1,true)+pb(2,false)+pb(3,false)+
  F('Collection Confirmation','collectConfirm','text',true,'Type your name to confirm all authorised persons have been informed their details are shared with the service')+
  sl('Legal Information','⚖️')+
  '<div class="info-box">Married parents are automatically joint guardians — this does not change with separation or divorce. We cannot refuse either parent to collect their child unless a court order is in place.</div>'+
  F('Any custody, access or legal information we should be aware of','legalNotes','textarea',false,'This remains confidential')+
  sl('Data Privacy &amp; Declaration','🔐')+
  '<div class="info-box">I have read the Service&#39;s Privacy Notice and consent to the collection and processing of my data. I understand I can withdraw consent at any time.</div>'+
  '<div class="field">'+chk('gdpr1','Parent / Guardian 1 — I have read the Privacy Notice and consent to the collection and processing of my data.')+
  '<div class="err-msg" id="e_gdpr1">Please confirm your consent.</div></div>'+
  '<div class="field"><label>Parent / Guardian 2 — Data Privacy Consent <span class="opt-tag">(optional)</span></label>'+
  '<div class="radio-grp">'+ropt('gdpr2','I consent to the collection and processing of my data')+ropt('gdpr2','Not applicable')+'</div></div>'+
  r2(F('Parent / Guardian 1 — Digital Signature','sig1','text',true,'Your typed name acts as your digital signature'),
     F('Parent / Guardian 2 — Digital Signature','sig2','text',false,'Leave blank if not applicable'))+
  F('Date of Submission','subDate','date',true)+
  '</div>'+
  '<div class="card-ft"><button class="btn btn-back" onclick="goBack(6)">&#8592; Back</button>'+
  '<button class="btn btn-submit" id="subBtn" onclick="submitForm()"><span id="subTxt">Submit Registration &#10003;</span></button></div>';
}

// ── Submit ────────────────────────────────────────────────────────────────
function submitForm() {
  saveInputs();
  var ok=true;
  ['collectChild','cp1Name','cp1Rel','cp1Mob','cp1Addr','collectConfirm','sig1','subDate'].forEach(function(id){if(!vReq(id))ok=false;});
  if(!S.gdpr1){vReq('gdpr1');ok=false;}
  if(!ok){showPErr();return;}

  document.getElementById('subBtn').disabled=true;
  document.getElementById('subTxt').innerHTML='<span class="spinner"></span> Submitting...';

  var summary = buildSummary();
  logToSheet();

  if (typeof emailjs !== 'undefined') {
    var params = {
      child_name: S.childName,
      parent_name: S.pg1Name,
      start_date: S.startDate,
      days: S.days.join(', '),
      cost_week: '\u20ac'+S.costWeek.toFixed(2),
      email: S.pg1Email,
      name: S.pg1Name,
      message: summary,
      title: 'New Registration: '+S.childName
    };
    // Try v3 send first, fall back to v2
    var sendFn;
    try {
      sendFn = emailjs.send('collooney_service','collooney_registration', params);
    } catch(e) {
      sendFn = Promise.reject(e);
    }
    sendFn.then(function(){
      console.log('Email sent successfully');
      showSuccess();
    }).catch(function(err){
      console.error('EmailJS send failed:', err);
      // Still show success - data is logged to Google Sheet
      showSuccess();
    });
  } else {
    // EmailJS blocked - data still logged to Google Sheet
    console.warn('EmailJS not available');
    showSuccess();
  }
}

function logToSheet() {
  try {
    var url='https://script.google.com/macros/s/AKfycbzc_7VWMwaISpba0_d3_nXeOk2v-FLI6s0wDjWcgaI4dEaE2PiCGfs_87dE5Tm7MCpl/exec';
    var p='action=log&child='+encodeURIComponent(S.childName)+'&parent='+encodeURIComponent(S.pg1Name)+
      '&email='+encodeURIComponent(S.pg1Email)+'&mobile='+encodeURIComponent(S.pg1Mob)+
      '&start='+encodeURIComponent(S.startDate)+'&days='+encodeURIComponent(S.days.join(','))+
      '&cls='+encodeURIComponent(S.cls)+'&rate='+encodeURIComponent(S.rate)+
      '&costDay='+encodeURIComponent(S.costDay)+'&costWeek='+encodeURIComponent(S.costWeek);
    var img=new Image(); img.src=url+'?'+p;
  } catch(e){}
}

function buildSummary() {
  var permsStr=Object.keys(S.perms).map(function(k){return k+': '+S.perms[k];}).join('\n');
  return [
    '=== BOOKING ===',
    'Start: '+S.startDate+' | Class: '+S.cls+' | Days: '+S.days.join(', '),
    'NCS Rate: €'+S.rate+'/hr | Cost/Day: €'+S.costDay.toFixed(2)+' | Cost/Week: €'+S.costWeek.toFixed(2),
    '','=== CHILD ===',
    'Name: '+S.childName+' | DOB: '+S.childDob,
    'Address: '+S.childAddr,
    'Other Children: '+S.otherChildren,
    '','=== PARENT 1 ===',
    S.pg1Name+' ('+S.pg1Rel+') | Mob: '+S.pg1Mob+' | Email: '+S.pg1Email,
    '=== PARENT 2 ===',
    S.pg2Name+' ('+S.pg2Rel+') | Mob: '+S.pg2Mob+' | Email: '+S.pg2Email,
    '','=== EMERGENCY CONTACT ===',
    S.ecName+' | Mob: '+S.ecMob+' | Addr: '+S.ecAddr,
    '','=== DOCTOR ===',
    S.drName+' | Tel: '+S.drTel+' | '+S.drAddr,
    'Medical History: '+S.medHistory,
    '','=== ALLERGIES ===',
    'Has Allergies: '+S.allergyYn+' | Allergic To: '+S.allergyWhat,
    'Reaction: '+S.allergyReaction,
    'Action: '+S.allergyAction,
    'Medication: '+S.allergyMed,
    '','=== CONSENTS ===',
    'Medical Treatment: '+(S.medConsent?'YES':'NO'),
    'Febrile Allergy: '+S.febrileAllergy+' | Febrile Consent: '+S.febrileConsent,
    '','=== PERMISSIONS ===',permsStr,
    '','=== COLLECTION ===',
    'Child: '+S.collectChild,
    'Person 1: '+S.cp1Name+' ('+S.cp1Rel+') '+S.cp1Mob,
    'Person 2: '+S.cp2Name+' ('+S.cp2Rel+') '+S.cp2Mob,
    'Person 3: '+S.cp3Name+' ('+S.cp3Rel+') '+S.cp3Mob,
    '','=== DECLARATION ===',
    'GDPR1: '+(S.gdpr1?'YES':'NO')+' | GDPR2: '+S.gdpr2,
    'Sig1: '+S.sig1+' | Sig2: '+S.sig2+' | Date: '+S.subDate
  ].join('\n');
}

// ── PDF ───────────────────────────────────────────────────────────────────
function sigBox(title, sigs) {
  var lines = sigs.map(function(s){
    return '<div><div style="border-bottom:2px solid #1A3560;height:32px;margin:6px 0 2px"></div><div style="font-size:9px;color:#888">'+s+'</div></div>';
  }).join('');
  var cols = sigs.length > 1 ? 'grid-template-columns:repeat('+Math.min(sigs.length,2)+',1fr)' : '';
  return '<div style="background:#FFF9C4;border:2px solid #F9A825;border-radius:7px;padding:13px;margin:10px 0">'+
    '<strong style="font-size:11px">'+title+'</strong>'+
    '<div style="display:grid;'+cols+';gap:14px;margin-top:6px">'+lines+'</div></div>';
}

function buildPDF() {
  var permsRows = Object.keys(S.perms).map(function(k){
    return '<tr><td style="padding:4px 8px;font-size:10px">'+k+'</td><td style="padding:4px 8px;font-size:10px;text-align:center">'+S.perms[k]+'</td></tr>';
  }).join('');

  function sec(title) { return '<h2 style="font-size:13px;color:#1A3560;margin:16px 0 6px;padding-bottom:4px;border-bottom:2px solid #2E86AB">'+title+'</h2>'; }
  function row(l,v) { return '<tr><td style="padding:4px 6px;font-weight:bold;width:35%;color:#1A3560;font-size:10px">'+l+'</td><td style="padding:4px 6px;font-size:10px">'+v+'</td></tr>'; }
  function tbl(rows) { return '<table style="width:100%;border-collapse:collapse;margin-bottom:8px">'+rows+'</table>'; }

  return '<!DOCTYPE html><html><head><meta charset="UTF-8">'+
    '<title>Registration - '+S.childName+'</title>'+
    '<style>body{font-family:Arial,sans-serif;font-size:11px;color:#1a1a2e;margin:0;padding:20px}'+
    '@media print{body{padding:12px}.noprint{display:none}}</style>'+
    '</head><body>'+
    '<div style="display:flex;align-items:center;gap:12px;border-bottom:3px solid #2E86AB;padding-bottom:12px;margin-bottom:16px">'+
    '<div><h1 style="font-size:18px;color:#1A3560;margin:0">Collooney Afterschool</h1>'+
    '<p style="margin:2px 0 0;font-size:9px;color:#999">St. Paul\'s N.S., Collooney, Co. Sligo &bull; Registration Form &bull; Submitted: '+S.subDate+'</p></div></div>'+

    sec('Booking & NCS Details')+
    tbl(row('Start Date',S.startDate)+row('Class',S.cls)+row('Days',S.days.join(', '))+
      row('NCS Rate','€'+parseFloat(S.rate).toFixed(2)+'/hr')+row('Cost Per Day','€'+S.costDay.toFixed(2))+row('Cost Per Week','€'+S.costWeek.toFixed(2)))+

    sec('Child\'s Details')+
    tbl(row('Full Name',S.childName)+row('Date of Birth',S.childDob)+row('Home Address',S.childAddr)+row('Other Children',S.otherChildren))+

    sec('Parent / Guardian 1')+
    tbl(row('Name',S.pg1Name)+row('Relationship',S.pg1Rel)+row('Mobile',S.pg1Mob)+row('Home Tel',S.pg1Home)+row('Work Tel',S.pg1Work)+row('Email',S.pg1Email)+row('Address',S.pg1Addr))+

    sec('Parent / Guardian 2')+
    tbl(row('Name',S.pg2Name)+row('Relationship',S.pg2Rel)+row('Mobile',S.pg2Mob)+row('Home Tel',S.pg2Home)+row('Email',S.pg2Email)+row('Address',S.pg2Addr))+

    sec('Emergency Contact')+
    tbl(row('Name',S.ecName)+row('Address',S.ecAddr)+row('Mobile',S.ecMob)+row('Home Tel',S.ecHome)+row('Work Tel',S.ecWork))+
    sigBox('Emergency Contact Confirmation',['Parent / Guardian Signature *','Date'])+

    sec('Family Doctor & Medical')+
    tbl(row('Doctor',S.drName)+row('Tel',S.drTel)+row('Surgery',S.drAddr)+row('Medical History',S.medHistory))+

    sec('Allergies')+
    tbl(row('Has Allergies',S.allergyYn)+row('Allergic To',S.allergyWhat)+row('Reaction',S.allergyReaction)+
      row('Action / Medication',S.allergyAction)+row('Medication Used',S.allergyMed)+row('Control Measures',S.allergyControl)+row('Other Comments',S.allergyOther))+

    sec('Agreement for Medical Treatment')+
    '<p style="font-size:9px;font-style:italic;margin:4px 0 6px">I hereby give consent to my child receiving medical treatment if a doctor thinks it is required as an emergency and I cannot be contacted. An ambulance will be called and the parent contacted.</p>'+
    tbl(row('Child\'s Name',S.medChildName)+row('Consent Given',(S.medConsent?'YES':'NO')))+
    sigBox('Medical Treatment Signatures',[
      'Parent / Guardian 1 Signature *','Date',
      'Parent / Guardian 2 Signature','Date',
      'Witnessed by Service Manager *','Date'])+

    sec('Agreement for Anti-Febrile Medication')+
    '<p style="font-size:9px;font-style:italic;margin:4px 0 6px">The service will only administer Calpol or Nurofen if a child has a temperature of 38°C or over. The parent will be contacted before any medication is administered.</p>'+
    tbl(row('Allergy to Anti-Febrile',S.febrileAllergy)+row('Consent Given',S.febrileConsent))+
    sigBox('Anti-Febrile Medication Signatures',[
      'Parent / Guardian 1 Signature *','Date',
      'Parent / Guardian 2 Signature','Date',
      'Witnessed by Service Manager *','Date'])+

    sec('Permissions')+
    '<table style="width:100%;border-collapse:collapse;margin-bottom:8px">'+
    '<thead><tr><th style="text-align:left;background:#1A3560;color:white;padding:5px 8px;font-size:10px">Permission</th>'+
    '<th style="background:#1A3560;color:white;padding:5px 8px;font-size:10px">Response</th></tr></thead>'+
    '<tbody>'+permsRows+'</tbody></table>'+
    sigBox('Permissions Signatures',[
      'Parent / Guardian 1 Signature *','Date',
      'Parent / Guardian 2 Signature','Date',
      'Witnessed by Service Manager *','Date'])+

    sec('Collection Authorisation')+
    '<p style="font-size:9px;font-style:italic;margin:4px 0 6px">I authorise the following people to collect my child in my absence. Unless I have spoken to the Manager, my child cannot be collected by any other person.</p>'+
    tbl(row('Child\'s Name',S.collectChild)+
      row('Person 1',S.cp1Name+' ('+S.cp1Rel+') — Mob: '+S.cp1Mob+(S.cp1Home?' | Home: '+S.cp1Home:''))+
      row('Address 1',S.cp1Addr)+
      (S.cp2Name?row('Person 2',S.cp2Name+' ('+S.cp2Rel+') — Mob: '+S.cp2Mob)+row('Address 2',S.cp2Addr):'')+
      (S.cp3Name?row('Person 3',S.cp3Name+' ('+S.cp3Rel+') — Mob: '+S.cp3Mob)+row('Address 3',S.cp3Addr):''))+
    sigBox('Collection Authorisation Signatures',[
      'Parent / Guardian Signature *','Date',
      'Witnessed by Service Manager *','Date'])+

    sec('Legal Information')+
    tbl(row('Legal / Custody Notes',S.legalNotes))+

    sec('Data Privacy & Declaration')+
    tbl(row('GDPR Consent PG1',(S.gdpr1?'Consent given':''))+row('GDPR Consent PG2',S.gdpr2)+
      row('Digital Signature PG1',S.sig1)+row('Digital Signature PG2',S.sig2)+row('Date',S.subDate))+
    sigBox('Data Privacy & Registration Consent Signatures',[
      'Parent / Guardian 1 Signature *','Date',
      'Parent / Guardian 2 Signature','Date',
      'Manager / Designated Person *','Date'])+

    '<div class="noprint" style="margin-top:24px;text-align:center">'+
    '<button onclick="window.print()" style="background:#1A3560;color:white;border:none;padding:12px 28px;border-radius:99px;font-size:13px;font-weight:bold;cursor:pointer;margin:4px">🖨 Print / Save as PDF</button>'+
    '<button onclick="window.close()" style="background:#7A8394;color:white;border:none;padding:12px 28px;border-radius:99px;font-size:13px;font-weight:bold;cursor:pointer;margin:4px">Close</button>'+
    '</div></body></html>';
}

function openPDF() {
  var html = buildPDF();
  var blob = new Blob([html],{type:'text/html'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href=url; a.target='_blank'; a.rel='noopener';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},10000);
}

function downloadPDF() {
  var html = buildPDF();
  var blob = new Blob([html],{type:'text/html'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href=url;
  a.download='CAS_Registration_'+(S.childName||'Form').replace(/\s+/g,'_')+'.html';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},5000);
}

// ── Success screen ────────────────────────────────────────────────────────
function showSuccess() {
  try { localStorage.removeItem('cas_reg'); } catch(e) {}
  renderProgress(8);
  document.getElementById('progFill').style.width='100%';
  document.getElementById('mainCard').innerHTML =
    '<div class="card-hd" style="background:linear-gradient(135deg,#2d9e6b,#1a7a50)">'+
    '<span class="card-hd-icon">✓</span>'+
    '<div><h2>Registration Submitted!</h2><p>Thank you for registering with Collooney Afterschool</p></div></div>'+
    '<div class="success-wrap">'+
    '<div class="success-icon">✓</div>'+
    '<p style="font-size:1rem;font-weight:700;color:var(--navy);margin-bottom:6px">'+S.childName+' — Registration Received</p>'+
    '<p style="color:var(--mid);font-size:0.83rem;margin-bottom:4px">A notification has been sent to Collooney Afterschool.</p>'+
    '<p style="color:var(--mid);font-size:0.83rem;margin-bottom:24px">Marie will be in touch to confirm your child\'s place and arrange signing of the registration document.</p>'+
    '<div style="display:flex;flex-direction:column;align-items:center;gap:8px">'+
    '<button class="pdf-btn" onclick="openPDF()">🖨 View &amp; Print Registration Form</button>'+
    '<button class="dl-btn" onclick="downloadPDF()">⬇ Download as File</button>'+
    '</div>'+
    '<p style="color:var(--mid);font-size:0.73rem;margin-top:14px;line-height:1.6">The form includes all your details and yellow signature boxes for your meeting with Marie.</p>'+
    '</div>';
}

// ── Start ─────────────────────────────────────────────────────────────────
render(S.pg || 1);
</script>
